<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joker Prototype</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b5d3b;
      color: white;
      overflow: hidden;
    }

    .player {
      position: absolute;
      text-align: center;
    }

    .top { top: 20px; left: 50%; transform: translateX(-50%); }
    .left { left: 20px; top: 50%; transform: translateY(-50%); }
    .right { right: 20px; top: 50%; transform: translateY(-50%); }
    .bottom { bottom: 20px; left: 50%; transform: translateX(-50%); }

    .cards {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      width: 50px;
      height: 70px;
      background: white;
      color: black;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
    }

    .card.red {
      color: red;
    }

    .card.back {
      background: #1e3a8a;
      color: white;
      cursor: default;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px dashed white;
      padding: 20px;
      border-radius: 20px;
      display: flex;
      gap: 20px;
    }

    #status {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
    }

    button {
      position: absolute;
      top: 10px;
      right: 10px;
    }
  </style>
</head>
<body>

<button onclick="startGame()">New Game</button>

<div class="player top">Bot 2<div class="cards" id="bot2"></div></div>
<div class="player left">Bot 1<div class="cards" id="bot1"></div></div>
<div class="player right">Bot 3<div class="cards" id="bot3"></div></div>
<div class="player bottom">You<div class="cards" id="player"></div></div>

<div class="center" id="table"></div>
<div id="status">Press New Game</div>

<script>
const suits = ["♠","♥","♦","♣"];
const ranks = ["6","7","8","9","10","J","Q","K","A"];
const value = {"6":1,"7":2,"8":3,"9":4,"10":5,"J":6,"Q":7,"K":8,"A":9};

let player=[], bot1=[], bot2=[], bot3=[];
let table=[];
let playerTurn=true;

function deck(){
  let d=[];
  suits.forEach(s=>ranks.forEach(r=>d.push({s,r})));
  return d;
}

function shuffle(d){
  for(let i=d.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [d[i],d[j]]=[d[j],d[i]];
  }
}

function drawCard(c,click){
  let d=document.createElement("div");
  d.className="card";
  if(c.s=="♥"||c.s=="♦") d.classList.add("red");
  d.innerText=c.r+c.s;
  if(click) d.onclick=click;
  return d;
}

function back(){
  let d=document.createElement("div");
  d.className="card back";
  d.innerText="🂠";
  return d;
}

function render(){
  let p=document.getElementById("player");
  let b1=document.getElementById("bot1");
  let b2=document.getElementById("bot2");
  let b3=document.getElementById("bot3");
  let t=document.getElementById("table");

  p.innerHTML=b1.innerHTML=b2.innerHTML=b3.innerHTML=t.innerHTML="";

  player.forEach((c,i)=>p.appendChild(drawCard(c,()=>play(i))));
  bot1.forEach(()=>b1.appendChild(back()));
  bot2.forEach(()=>b2.appendChild(back()));
  bot3.forEach(()=>b3.appendChild(back()));

  table.forEach(c=>t.appendChild(drawCard(c)));
}

function startGame(){
  let d=deck();
  shuffle(d);
  player=d.splice(0,5);
  bot1=d.splice(0,5);
  bot2=d.splice(0,5);
  bot3=d.splice(0,5);
  table=[];
  playerTurn=true;
  render();
  status("Your turn");
}

function status(s){
  document.getElementById("status").innerText=s;
}

function play(i){
  if(!playerTurn) return;

  let lead=table[0];
  let chosen=player[i];

  if(lead){
    let hasSuit=player.some(c=>c.s==lead.s);
    if(hasSuit && chosen.s!=lead.s){
      alert("Follow suit!");
      return;
    }
  }

  table.push(player.splice(i,1)[0]);
  playerTurn=false;
  render();

  setTimeout(botMove,500);
}

function botMove(){
  [bot1,bot2,bot3].forEach(bot=>{
    if(bot.length>0){
      let lead=table[0];
      let options=bot;

      if(lead){
        let same=bot.filter(c=>c.s==lead.s);
        if(same.length>0) options=same;
      }

      let card=options[Math.floor(Math.random()*options.length)];
      bot.splice(bot.indexOf(card),1);
      table.push(card);
    }
  });

  render();
  setTimeout(endTrick,700);
}

function endTrick(){
  let lead=table[0].s;
  let win=table[0];

  table.forEach(c=>{
    if(c.s==lead && value[c.r]>value[win.r]){
      win=c;
    }
  });

  status("Winner: "+win.r+win.s);

  setTimeout(()=>{
    table=[];
    if(player.length==0){
      status("Round finished");
      return;
    }
    playerTurn=true;
    render();
    status("Your turn");
  },1000);
}
</script>

</body>
</html>
