<!DOCTYPE html>
<html>
<head>
  <title>Avoid Game</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    #score {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 24px;
    }
    .btn {
      position: absolute;
      padding: 20px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }
    .good {
      background: green;
    }
    .bad {
      background: red;
    }
  </style>
</head>
<body>

<div id="score">Score: 0</div>

<button id="good" class="btn good">+1</button>
<button id="bad" class="btn bad">💀</button>

<script>
let score = 0;

const goodBtn = document.getElementById("good");
const badBtn = document.getElementById("bad");

function moveButtons() {
  const width = window.innerWidth - 100;
  const height = window.innerHeight - 100;

  goodBtn.style.left = Math.random() * width + "px";
  goodBtn.style.top = Math.random() * height + "px";

  badBtn.style.left = Math.random() * width + "px";
  badBtn.style.top = Math.random() * height + "px";
}

goodBtn.onclick = () => {
  score++;
  document.getElementById("score").innerText = "Score: " + score;
  moveButtons();
};

badBtn.onclick = () => {
  alert("Game Over! Score: " + score);
  score = 0;
  document.getElementById("score").innerText = "Score: 0";
  moveButtons();
};

moveButtons();
</script>

</body>
</html>
